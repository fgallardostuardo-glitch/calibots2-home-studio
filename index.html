<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#6d5efc" />
  <title>Calibots 2 Home Studio</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml" />
  <style>
    :root{
      --bg:#eef3fb;--card:rgba(255,255,255,.88);--text:#1b2436;--muted:#66748b;--border:rgba(27,36,54,.08);
      --shadow:0 18px 45px rgba(34,52,92,.16);--shadow-sm:0 8px 20px rgba(34,52,92,.1);--accent:#6d5efc;
      --radius:28px;--radius-sm:18px;--nav-h:72px;
    }
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{margin:0;min-height:100%;font-family:Inter,system-ui,-apple-system,Segoe UI,sans-serif;color:var(--text);background:
      radial-gradient(circle at top left,#fff 0%,#edf4ff 35%,transparent 60%),
      radial-gradient(circle at top right,#f8e8ff 0%,transparent 40%),
      linear-gradient(180deg,#eef3fb 0%,#f7f9fd 100%)}
    button,input,select{font:inherit}
    button{cursor:pointer;border:0}
    #app{min-height:100vh;padding:18px}
    .shell{max-width:1360px;margin:0 auto;min-height:calc(100vh - 36px);background:rgba(255,255,255,.45);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.8);border-radius:38px;box-shadow:var(--shadow);overflow:hidden;display:grid;grid-template-rows:64px 1fr}
    .topbar{display:flex;align-items:center;justify-content:space-between;gap:14px;padding:12px 18px;background:linear-gradient(180deg,rgba(255,255,255,.92),rgba(255,255,255,.68));border-bottom:1px solid var(--border)}
    .dots{display:flex;gap:8px}.dot{width:12px;height:12px;border-radius:50%}.r{background:#fb7185}.y{background:#fbbf24}.g{background:#34d399}
    .titlebar{display:flex;gap:12px;align-items:center;flex:1;min-width:0}.robot{width:40px;height:40px;border-radius:14px;display:grid;place-items:center;background:linear-gradient(135deg,#7c6bff,#38bdf8);color:#fff;font-size:22px;box-shadow:var(--shadow-sm)}
    .titlebar h1{margin:0;font-size:18px;font-weight:800}.titlebar p{margin:2px 0 0;font-size:12px;color:var(--muted)}
    .pill{padding:11px 14px;border-radius:999px;background:#fff;border:1px solid var(--border);font-weight:800;box-shadow:var(--shadow-sm);display:inline-flex;align-items:center;gap:8px}
    .layout{display:grid;grid-template-columns:310px 1fr;min-height:0}
    .sidebar{background:linear-gradient(180deg,#182132 0%,#24314a 100%);color:#fff;padding:18px 16px 22px;display:flex;flex-direction:column;gap:14px}
    .brand,.tip{border-radius:24px;padding:16px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12)}
    .brand h2,.tip h3{margin:0}.brand p,.tip li{color:rgba(255,255,255,.78)} .brand p{margin:6px 0 0;line-height:1.4}
    .unit-list{display:grid;gap:10px;overflow:auto;padding-right:3px}
    .unit-btn{padding:14px 15px;border-radius:18px;text-align:left;background:rgba(255,255,255,.08);color:#fff;border:1px solid transparent;display:grid;gap:6px;transition:.18s ease transform,.18s ease background}
    .unit-btn:hover,.unit-btn:focus-visible{transform:translateY(-2px);background:rgba(255,255,255,.14)}
    .unit-btn.active{background:linear-gradient(135deg,rgba(124,107,255,.98),rgba(139,92,246,.88));border-color:rgba(255,255,255,.24)}
    .unit-btn small{color:rgba(255,255,255,.72)}
    .main{padding:22px;overflow:auto;display:grid;gap:16px}
    .hero,.card{border-radius:34px;background:var(--card);border:1px solid rgba(255,255,255,.76);box-shadow:var(--shadow);padding:22px}
    .hero{position:relative;overflow:hidden}.hero-bg{position:absolute;inset:0;opacity:.96}.hero-content{position:relative;z-index:1;display:grid;grid-template-columns:1.15fr .85fr;gap:16px;align-items:center}
    .eyebrow{font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:rgba(27,36,54,.65);font-weight:800}.hero h2{margin:10px 0;font-size:clamp(34px,5vw,58px);line-height:.96}.hero p{margin:0;color:rgba(27,36,54,.74);font-size:18px;line-height:1.45}
    .tags,.actions,.controls,.mode-grid,.stats,.choices,.unit-cards{display:flex;flex-wrap:wrap;gap:12px}.tag{padding:10px 12px;border-radius:999px;background:rgba(255,255,255,.72);border:1px solid rgba(255,255,255,.5);font-weight:700}
    .btn{padding:15px 18px;border-radius:18px;font-weight:800;display:inline-flex;gap:10px;align-items:center;justify-content:center;transition:.16s ease transform,.16s ease box-shadow}.btn:hover,.btn:focus-visible{transform:translateY(-2px);box-shadow:var(--shadow-sm)}
    .primary{background:var(--accent);color:#fff}.secondary{background:#fff;color:var(--text);border:1px solid var(--border)}.ghost{background:rgba(255,255,255,.12);color:inherit;border:1px solid rgba(255,255,255,.14)}
    .mascot{min-height:300px;border-radius:28px;background:rgba(255,255,255,.58);display:grid;place-items:center;text-align:center;padding:20px;border:1px solid rgba(255,255,255,.6)}
    .mascot-bubble{width:148px;height:148px;border-radius:40px;display:grid;place-items:center;background:linear-gradient(135deg,rgba(124,107,255,.16),rgba(56,189,248,.12));font-size:90px;box-shadow:var(--shadow-sm)}
    .mascot h3{margin:14px 0 0;font-size:28px}.mascot p{margin:6px 0 0;color:rgba(27,36,54,.72)}
    .stats{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:14px}.stat,.mode{border-radius:24px;padding:18px;background:var(--card);border:1px solid rgba(255,255,255,.72);box-shadow:var(--shadow-sm)}
    .iconbox{width:52px;height:52px;border-radius:18px;display:grid;place-items:center;font-size:28px;background:#fff;box-shadow:var(--shadow-sm)}.stat h3,.mode h3{margin:10px 0 4px;font-size:20px}.stat p,.mode p{margin:0;color:var(--muted);line-height:1.45}
    .mode-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:14px}.mode{cursor:pointer;text-align:left}
    .activity-head{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;flex-wrap:wrap;margin-bottom:14px}.activity-head h2{margin:6px 0 0;font-size:clamp(28px,4vw,42px)}.activity-head p{margin:0;color:var(--muted);line-height:1.45}
    .stage{display:grid;grid-template-columns:.95fr 1.05fr;gap:18px;align-items:stretch}.visual-stage{border-radius:30px;min-height:320px;background:linear-gradient(180deg,rgba(255,255,255,.78),rgba(248,250,255,.96));border:1px solid rgba(27,36,54,.06);display:grid;place-items:center;overflow:hidden;position:relative}
    .visual-stage:after{content:'';position:absolute;inset:auto -15% -25% auto;width:220px;height:220px;background:radial-gradient(circle,rgba(109,94,252,.14),transparent 65%);filter:blur(20px)}
    .visual{width:min(100%,260px);aspect-ratio:1/1;border-radius:30px;display:grid;place-items:center;background:#fff;box-shadow:var(--shadow-sm);position:relative;z-index:1}.visual.color .swatch{width:68%;height:68%;border-radius:26px;box-shadow:inset 0 0 0 8px rgba(255,255,255,.35),0 12px 22px rgba(0,0,0,.08)}
    .visual.number div{font-size:clamp(92px,14vw,140px);font-weight:900;color:#24314a}.visual.emoji div{font-size:clamp(76px,12vw,118px)}.shape-wrap{width:72%;height:72%;display:grid;place-items:center}.shape-circle{width:78%;height:78%;background:#facc15;border-radius:50%}.shape-square{width:78%;height:78%;background:#ef4444;border-radius:22px}.shape-triangle{width:0;height:0;border-left:76px solid transparent;border-right:76px solid transparent;border-bottom:130px solid #84cc16}.visual.size .dot-size{border-radius:50%;background:linear-gradient(135deg,#8b5cf6,#d946ef)}
    .copy h3{margin:0 0 6px;font-size:clamp(30px,4vw,46px)}.copy p{margin:0;color:var(--muted);line-height:1.5;font-size:17px}.label-row{display:flex;gap:10px;flex-wrap:wrap;margin:12px 0 0}.label{padding:10px 12px;border-radius:999px;background:#fff;border:1px solid var(--border);font-weight:800}.muted{color:var(--muted)}
    .progress{height:14px;border-radius:999px;background:#e8ecf3;overflow:hidden;margin-top:16px}.bar{height:100%;width:0%;background:linear-gradient(90deg,#6d5efc,#38bdf8);border-radius:999px}
    .feedback{min-height:28px;font-weight:900;margin-top:12px}.ok{color:#16a34a}.bad{color:#ef4444}
    .choices{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}.choice,.match-card{padding:14px;border-radius:24px;background:#fff;border:1px solid var(--border);box-shadow:var(--shadow-sm);text-align:left}.choice.selected,.match-card.selected{outline:3px solid rgba(109,94,252,.28)}.choice .visual,.match-card .visual{width:min(100%,170px);margin:0 auto;border-radius:24px}.choice .name,.match-card .name{margin-top:10px;text-align:center;font-weight:800}
    .pair-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}.settings-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}.setting{border-radius:22px;padding:18px;background:#fff;border:1px solid var(--border);box-shadow:var(--shadow-sm)} .setting h3{margin:0 0 8px}.setting p{margin:0 0 12px;color:var(--muted)}
    .input,.select{width:100%;padding:13px 14px;border-radius:16px;border:1px solid var(--border);background:#f9fbff}.toggle{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:12px 14px;border-radius:16px;background:#f9fbff;border:1px solid var(--border);margin-top:10px}
    .bottom{display:none;position:sticky;bottom:0;z-index:9;background:rgba(255,255,255,.9);backdrop-filter:blur(18px);border-top:1px solid var(--border);padding:10px 12px calc(10px + env(safe-area-inset-bottom));grid-template-columns:repeat(4,1fr);gap:10px}.nav{padding:11px 8px;border-radius:16px;background:transparent;color:var(--muted);display:grid;place-items:center;gap:5px;font-weight:800}.nav.active{background:#fff;color:var(--text);box-shadow:var(--shadow-sm)}
    .toast{position:fixed;right:20px;bottom:24px;z-index:30;min-width:250px;max-width:360px;padding:14px 16px;border-radius:20px;background:#182132;color:#fff;box-shadow:var(--shadow);display:grid;gap:4px;opacity:0;transform:translateY(16px);pointer-events:none;transition:.22s ease}.toast.show{opacity:1;transform:translateY(0)}
    @media (max-width:1180px){.stats,.mode-grid{grid-template-columns:repeat(2,minmax(0,1fr))}.stage{grid-template-columns:1fr}.hero-content{grid-template-columns:1fr}.mascot{min-height:240px}}
    @media (max-width:920px){#app{padding:10px}.shell{border-radius:24px;min-height:100vh;grid-template-rows:64px 1fr auto}.layout{grid-template-columns:1fr}.sidebar{display:none}.main{padding:14px 14px calc(var(--nav-h) + 16px)}.bottom{display:grid}.topbar{padding:12px 14px}.titlebar h1{font-size:16px}.pill{padding:10px 12px}.choices{grid-template-columns:1fr}.pair-grid,.settings-grid,.stats,.mode-grid{grid-template-columns:1fr}.hero,.card{padding:16px;border-radius:24px}.visual-stage{min-height:250px}}
  </style>
</head>

    let toastTimer = null;
    const app = document.getElementById('app');
    render();
    if(state.autoSpeak && state.screen === 'home') setTimeout(()=>speak(`Hello ${state.name}. Let\'s learn English.`),180);
    if('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js').catch(()=>{});

    function defaultProgress(){ const p={}; CONTENT.units.forEach(u=>p[u.id]={stars:0,badge:'',best:0,done:[]}); return p; }
    function load(){ try{ const raw=JSON.parse(localStorage.getItem(STORE)||'null'); return raw?{...baseState(),...raw,progress:{...defaultProgress(),...(raw.progress||{})}}:baseState(); }catch{return baseState();} }
    function baseState(){ return {screen:'home',mode:'learn',unitId:'u1',learnIndex:0,round:0,score:0,feedback:{type:'',text:''},choices:[],pairLeft:[],pairRight:[],solved:[],selected:{left:null,right:null},name:'Explorer',readerMode:'pre',showSpanish:true,showEnglish:false,autoSpeak:true,session:10,progress:defaultProgress(),toast:null}; }
    function save(){ localStorage.setItem(STORE, JSON.stringify({screen:state.screen,mode:state.mode,unitId:state.unitId,learnIndex:state.learnIndex,round:state.round,name:state.name,readerMode:state.readerMode,showSpanish:state.showSpanish,showEnglish:state.showEnglish,autoSpeak:state.autoSpeak,session:state.session,progress:state.progress})); }
    function unit(){ return CONTENT.units.find(u=>u.id===state.unitId) || CONTENT.units[0]; }
    function progress(id=state.unitId){ return state.progress[id]; }
    function render(){ const u=unit(); document.documentElement.style.setProperty('--accent',u.accent); app.innerHTML = `<div class="shell">${topbar(u)}<div class="layout">${sidebar(u)}<main class="main">${screen(u)}</main></div>${bottom()}</div><div class="toast ${state.toast?'show':''}">${state.toast?`<strong>${state.toast.title}</strong><span>${state.toast.msg}</span>`:''}</div>`; bind(); save(); }
    function topbar(u){ return `<div class="topbar"><div class="dots"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span></div><div class="titlebar"><div class="robot">🤖</div><div><h1>${CONTENT.appTitle}</h1><p>${u.title} · ${CONTENT.appSubtitle}</p></div></div><div class="pill">⭐ ${progress().stars}</div></div>`; }
    function sidebar(u){ return `<aside class="sidebar"><section class="brand"><h2>Home Studio</h2><p>Audio-first English practice designed for a 5-year-old child, with desktop-style presentation and mobile-friendly controls.</p></section><section class="unit-list">${CONTENT.units.map((x,i)=>`<button class="unit-btn ${x.id===u.id?'active':''}" data-unit="${x.id}"><strong>Unit ${i+1} · ${x.title}</strong><small>${x.theme}</small><small>⭐ ${progress(x.id).stars} · Quiz best ${progress(x.id).best}</small></button>`).join('')}</section><section class="tip"><h3>Parent tips</h3><ul>${CONTENT.tips.map(t=>`<li>${t}</li>`).join('')}</ul></section></aside>`; }
    function bottom(){ const items=[['home','🏠','Home'],['learn','🧭','Explore'],['listen','🎧','Listen'],['settings','🛠️','Parent']]; return `<nav class="bottom">${items.map(([id,icon,label])=>`<button class="nav ${activeNav(id)?'active':''}" data-nav="${id}"><span>${icon}</span><span>${label}</span></button>`).join('')}</nav>`; }
    function activeNav(id){ return (state.screen==='home'&&id==='home')||(state.screen==='settings'&&id==='settings')||(state.screen==='activity'&&state.mode===id); }
    function screen(u){ if(state.screen==='settings') return settings(); if(state.screen==='activity') return activity(u); return home(u); }
    function home(u){ return `<section class="hero"><div class="hero-bg" style="background:${u.gradient}"></div><div class="hero-content"><div><div class="eyebrow">Calibots 2 · Responsive study app</div><h2>${u.title}</h2><p>${u.description} The app is built around short audio-led tasks, playful repetition and gentle progress tracking.</p><div class="tags" style="margin-top:14px">${u.prompts.map(p=>`<span class="tag">${p}</span>`).join('')}</div><div class="actions" style="margin-top:18px"><button class="btn primary" data-mode="learn">🧭 Start explorer</button><button class="btn secondary" data-mode="listen">🎧 Listen & tap</button><button class="btn secondary" data-mode="quiz">🚀 Mission quiz</button></div></div><div class="mascot"><div><div class="mascot-bubble">🤖</div><h3>Hello, ${escape(state.name)}!</h3><p>${state.readerMode==='pre'?'Pre-reader mode is active.':'Reader support is active.'}</p><div class="actions" style="justify-content:center"><button class="btn secondary" data-action="speak-unit">🔊 Hear unit</button></div></div></div></div></section><section class="stats"><article class="stat"><div class="iconbox">⭐</div><h3>${progress().stars}</h3><p>Stars earned in this unit</p></article><article class="stat"><div class="iconbox">🏆</div><h3>${progress().badge||'None yet'}</h3><p>Latest badge collected</p></article><article class="stat"><div class="iconbox">🧠</div><h3>${u.items.length}</h3><p>Vocabulary targets loaded</p></article><article class="stat"><div class="iconbox">⏱️</div><h3>${state.session} min</h3><p>Parent-selected session length</p></article></section><section class="card"><div class="activity-head"><div><div class="eyebrow">Best practice modes</div><h2>Play modes</h2><p>Each mode is short, visual and audio-led, with optional reading support.</p></div><button class="btn secondary" data-nav="settings">🛠️ Parent settings</button></div><div class="mode-grid">${CONTENT.modes.map(m=>`<button class="mode" data-mode="${m.id}"><div class="iconbox">${m.icon}</div><h3>${m.title}</h3><p>${m.desc}</p></button>`).join('')}</div></section>`; }
    function activity(u){ if(state.mode==='match') return matchScreen(u); const item = state.mode==='learn' ? u.items[state.learnIndex] : state.deck[state.round]; const pct = state.mode==='learn' ? ((state.learnIndex+1)/u.items.length)*100 : ((state.round)/(state.deck.length||1))*100; return `<section class="card"><div class="activity-head"><div><div class="eyebrow">${state.mode==='learn'?'Explorer mode':state.mode==='listen'?'Listen & Tap':'Mission Quiz'}</div><h2>${u.title}</h2><p>${state.mode==='learn'?'Big cards, audio first, zero pressure.':state.mode==='listen'?'Hear the word and choose the correct visual card.':'Short mixed challenge with stars and badges.'}</p></div><button class="btn secondary" data-action="go-home">🏠 Home</button></div><div class="stage"><div class="visual-stage">${visual(item)}</div><div class="copy"><h3>${display(item)}</h3><p class="muted">${state.mode==='learn'?'Tap the speaker, listen and say it together.':'Listen carefully and choose the correct answer.'}</p><div class="label-row"><span class="label">${item.category}</span><span class="label">Unit target</span></div><div class="controls"><button class="btn primary" data-action="speak">🔊 Listen</button>${state.mode==='learn'?`<button class="btn secondary" data-action="prev">⬅️ Previous</button><button class="btn secondary" data-action="next">Next ➡️</button>`:`<button class="btn secondary" data-action="replay">🎧 Repeat prompt</button>`}</div>${state.mode==='learn'?'':`<div class="choices" style="margin-top:16px">${state.choices.map(c=>`<button class="choice" data-choice="${c.id}">${visual(c,'small')}<div class="name">${showText()?c.label:(state.showSpanish?c.es:c.category)}</div></button>`).join('')}</div><div class="feedback ${state.feedback.type==='ok'?'ok':state.feedback.type==='bad'?'bad':''}">${state.feedback.text||''}</div>`}<div class="progress"><div class="bar" style="width:${pct}%"></div></div></div></div></section>`; }
    function matchScreen(u){ return `<section class="card"><div class="activity-head"><div><div class="eyebrow">Match It</div><h2>${u.title}</h2><p>Listen to the word and match the card on the left with the correct picture on the right.</p></div><button class="btn secondary" data-action="go-home">🏠 Home</button></div><div class="controls" style="margin-bottom:14px"><button class="btn primary" data-action="speak-unsolved">🔊 Hear unsolved words</button></div><div class="pair-grid"><div class="unit-cards">${state.pairLeft.map(x=>`<button class="match-card ${state.selected.left===x.id?'selected':''}" data-match-left="${x.id}">${visual(x,'small')}<div class="name">${showText()?x.label:(state.showSpanish?x.es:x.category)}</div></button>`).join('')}</div><div class="unit-cards">${state.pairRight.map(x=>`<button class="match-card ${state.selected.right===x.id?'selected':''}" data-match-right="${x.id}">${visual(x,'small')}<div class="name">${showText()?x.label:(state.showSpanish?x.es:x.category)}</div></button>`).join('')}</div></div><div class="feedback ${state.feedback.type==='ok'?'ok':state.feedback.type==='bad'?'bad':''}">${state.feedback.text||''}</div></section>`; }
    function settings(){ return `<section class="card"><div class="activity-head"><div><div class="eyebrow">Parent controls</div><h2>Settings</h2><p>Adapt the experience for pre-readers and emergent readers.</p></div><button class="btn secondary" data-action="go-home">🏠 Home</button></div><div class="settings-grid"><article class="setting"><h3>Child name</h3><p>Used in greetings and feedback.</p><input class="input" id="childName" maxlength="18" value="${escapeAttr(state.name)}" placeholder="Explorer" /></article><article class="setting"><h3>Session length</h3><p>Choose the target duration for each practice block.</p><select class="select" id="sessionLength"><option ${state.session===8?'selected':''}>8</option><option ${state.session===10?'selected':''}>10</option><option ${state.session===12?'selected':''}>12</option><option ${state.session===15?'selected':''}>15</option></select></article><article class="setting"><h3>Reading support</h3><p>Switch between pre-reader and reader-support modes.</p><div class="toggle"><span>Pre-reader mode</span><button class="btn ${state.readerMode==='pre'?'primary':'secondary'}" data-action="toggle-reader">${state.readerMode==='pre'?'Active':'Activate'}</button></div><div class="toggle"><span>Show Spanish hints</span><button class="btn ${state.showSpanish?'primary':'secondary'}" data-action="toggle-spanish">${state.showSpanish?'On':'Off'}</button></div><div class="toggle"><span>Show English text</span><button class="btn ${state.showEnglish?'primary':'secondary'}" data-action="toggle-english">${state.showEnglish?'On':'Off'}</button></div></article><article class="setting"><h3>Audio and progress</h3><p>Control speech behavior and saved progress.</p><div class="toggle"><span>Auto-speak prompts</span><button class="btn ${state.autoSpeak?'primary':'secondary'}" data-action="toggle-audio">${state.autoSpeak?'On':'Off'}</button></div><div class="toggle"><span>Reset saved progress</span><button class="btn secondary" data-action="reset">Reset</button></div></article></div></section>`; }
    function bind(){ app.querySelectorAll('[data-unit]').forEach(b=>b.onclick=()=>{state.unitId=b.dataset.unit; state.screen='home'; state.learnIndex=0; clearFeedback(); render();}); app.querySelectorAll('[data-mode]').forEach(b=>b.onclick=()=>startMode(b.dataset.mode)); app.querySelectorAll('[data-nav]').forEach(b=>b.onclick=()=>nav(b.dataset.nav)); app.querySelectorAll('[data-action]').forEach(b=>b.onclick=()=>act(b.dataset.action)); app.querySelectorAll('[data-choice]').forEach(b=>b.onclick=()=>pick(b.dataset.choice)); app.querySelectorAll('[data-match-left]').forEach(b=>b.onclick=()=>choose('left',b.dataset.matchLeft)); app.querySelectorAll('[data-match-right]').forEach(b=>b.onclick=()=>choose('right',b.dataset.matchRight)); const name=document.getElementById('childName'); if(name) name.oninput=e=>{state.name=sanitize(e.target.value)||'Explorer'; save();}; const session=document.getElementById('sessionLength'); if(session) session.onchange=e=>{state.session=Number(e.target.value); toast('Session updated',`${state.session} minute sessions selected.`); render();}; }
    function nav(id){ if(id==='home'){state.screen='home'; render(); return;} if(id==='settings'){state.screen='settings'; render(); return;} startMode(id); }
    function act(id){ const u=unit(); if(id==='go-home'){state.screen='home'; render(); return;} if(id==='speak-unit'){speak(`${u.title}. ${u.theme}.`); return;} if(id==='speak'){ if(state.mode==='learn') speak(u.items[state.learnIndex].label); else speak(promptText()); return;} if(id==='prev'){ state.learnIndex=(state.learnIndex-1+u.items.length)%u.items.length; render(); if(state.autoSpeak) speak(u.items[state.learnIndex].label); return;} if(id==='next'){ progress().stars +=1; state.learnIndex=(state.learnIndex+1)%u.items.length; render(); if(state.autoSpeak) speak(u.items[state.learnIndex].label); return;} if(id==='replay'){ speak(promptText()); return;} if(id==='toggle-reader'){ state.readerMode=state.readerMode==='pre'?'reader':'pre'; if(state.readerMode==='pre') state.showEnglish=false; render(); return;} if(id==='toggle-spanish'){ state.showSpanish=!state.showSpanish; render(); return;} if(id==='toggle-english'){ state.showEnglish=!state.showEnglish; if(state.showEnglish) state.readerMode='reader'; render(); return;} if(id==='toggle-audio'){ state.autoSpeak=!state.autoSpeak; render(); return;} if(id==='reset'){ if(confirm('Reset all stars, badges and best scores?')){ state.progress=defaultProgress(); toast('Progress reset','All saved progress was cleared.'); render(); } return;} if(id==='speak-unsolved'){ const unsolved=state.pairLeft.filter(x=>!state.solved.includes(x.id)); if(unsolved.length) speak(unsolved.map(x=>x.label).join(', ')); return;} }
    function startMode(mode){ state.screen='activity'; state.mode=mode; state.round=0; state.score=0; state.feedback={type:'',text:''}; state.selected={left:null,right:null}; state.solved=[]; const u=unit(); if(mode==='learn'){ state.learnIndex=0; render(); if(state.autoSpeak) setTimeout(()=>speak(u.items[0].label),120); return; } if(mode==='match'){ state.pairLeft=shuffle(u.items).slice(0,Math.min(u.items.length,5)); state.pairRight=shuffle(state.pairLeft); render(); return; } state.deck=shuffle(u.items).slice(0,Math.min(u.items.length,8)); state.choices=choiceSet(state.deck[0],u.items); render(); if(state.autoSpeak) setTimeout(()=>speak(promptText()),120); }
    function choiceSet(current,pool){ const wrong=shuffle(pool.filter(x=>x.id!==current.id)).slice(0,3); return shuffle([current,...wrong]); }
    function promptText(){ const cur=state.deck[state.round]; return `${state.mode==='quiz'?'Find':'Touch'} ${cur.label}`; }
    function pick(id){ const cur=state.deck[state.round]; if(!cur) return; if(id===cur.id){ state.feedback={type:'ok',text:state.showSpanish?'¡Muy bien!':'Great job!'}; progress().stars += 1; state.score += 1; speak(`Great job. ${cur.label}.`); setTimeout(()=>advance(),760); render(); } else { state.feedback={type:'bad',text:state.showSpanish?'Intenta de nuevo':'Try again'}; render(); speak(`Try again. ${cur.label}.`); } }
    function advance(){ state.round += 1; state.feedback={type:'',text:''}; const cur=state.deck[state.round]; if(!cur){ finishMode(); render(); return; } state.choices=choiceSet(cur,unit().items); render(); if(state.autoSpeak) speak(promptText()); }
    function finishMode(){ const p=progress(); p.best=Math.max(p.best,state.score); if(state.score>=Math.max(4,Math.ceil((state.deck||[]).length*.7))) p.badge = CONTENT.badges[(state.score + (state.deck||[]).length) % CONTENT.badges.length]; toast('Mode finished', `Score ${state.score} / ${(state.deck||[]).length || 0}`); state.screen='home'; }
    function choose(side,id){ if(state.solved.includes(id)) return; state.selected[side]=id; if(side==='left'){ const item=state.pairLeft.find(x=>x.id===id); if(item) speak(item.label); } render(); if(state.selected.left && state.selected.right){ if(state.selected.left===state.selected.right){ state.solved.push(id); progress().stars += 1; state.feedback={type:'ok',text:state.showSpanish?'¡Pareja correcta!':'Perfect match!'}; speak('Perfect match.'); state.selected={left:null,right:null}; if(state.solved.length>=state.pairLeft.length){ progress().badge = CONTENT.badges[(progress().stars + state.solved.length) % CONTENT.badges.length]; toast('Match complete','All pairs solved.'); state.screen='home'; } render(); } else { state.feedback={type:'bad',text:state.showSpanish?'No es la misma':'Not a match'}; render(); speak('Not a match. Try again.'); setTimeout(()=>{ state.selected={left:null,right:null}; state.feedback={type:'',text:''}; render(); },700); } } }
    function visual(item,size='large'){ const box = size==='small' ? 'style="width:min(100%,170px);border-radius:24px;margin:auto"' : ''; if(!item) return ''; if(item.kind==='color') return `<div class="visual color" ${box}><div class="swatch" style="background:${item.value}"></div></div>`; if(item.kind==='number') return `<div class="visual number" ${box}><div>${item.value}</div></div>`; if(item.kind==='shape'){ const shape = item.value==='triangle' ? '<div class="shape-triangle"></div>' : item.value==='square' ? '<div class="shape-square"></div>' : '<div class="shape-circle"></div>'; return `<div class="visual shape" ${box}><div class="shape-wrap">${shape}</div></div>`; } if(item.kind==='size'){ const px = item.value==='big' ? 150 : 84; return `<div class="visual size" ${box}><div class="dot-size" style="width:${px}px;height:${px}px"></div></div>`; } return `<div class="visual emoji" ${box}><div>${item.value}</div></div>`; }
    function display(item){ if(showText()) return state.showSpanish ? `${item.label} · ${item.es}` : item.label; return state.showSpanish ? item.es : item.category; }
    function showText(){ return state.showEnglish || state.readerMode==='reader'; }
    function speak(text){ if(!('speechSynthesis' in window) || !text) return; window.speechSynthesis.cancel(); const u=new SpeechSynthesisUtterance(text); u.lang='en-US'; u.rate=.86; u.pitch=1.08; const voices=window.speechSynthesis.getVoices(); const voice=voices.find(v=>/^en(-|_)/i.test(v.lang)); if(voice) u.voice=voice; window.speechSynthesis.speak(u); }
    function shuffle(arr){ return [...arr].sort(()=>Math.random()-.5); }
    function toast(title,msg){ state.toast={title,msg}; render(); clearTimeout(toastTimer); toastTimer=setTimeout(()=>{state.toast=null; render();},1800); }
    function clearFeedback(){ state.feedback={type:'',text:''}; }
    function sanitize(v){ return String(v||'').replace(/[<>]/g,'').trim().slice(0,18); }
    function escape(v){ return String(v).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;'); }
    function escapeAttr(v){ return escape(v); }
  </script>
</body>
</html>
