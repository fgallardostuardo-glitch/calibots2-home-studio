const K='calibots2-home-studio-v4';let T=null;const S=load(),A=document.getElementById('app');render();if('serviceWorker' in navigator)navigator.serviceWorker.register('./sw.js').catch(()=>{});
function base(){return{screen:'home',mode:'learn',unit:'u1',sel:['u1'],li:0,ld:[],d:[],r:0,score:0,fb:['',''],ch:[],ml:[],mr:[],ms:[],sa:null,name:'Explorer',reader:'pre',es:true,en:false,audio:true,min:10,prog:defp(),toast:null}}
function defp(){const p={};C.u.forEach(u=>p[u.id]={s:0,b:'',q:0});return p}
function load(){try{const x=JSON.parse(localStorage.getItem(K)||'null');if(!x)return base();const y={...base(),...x,prog:{...defp(),...(x.prog||{})}};if(!Array.isArray(y.sel)||!y.sel.length)y.sel=['u1'];return y}catch{return base()}}
function save(){localStorage.setItem(K,JSON.stringify({screen:S.screen,mode:S.mode,unit:S.unit,sel:S.sel,li:S.li,name:S.name,reader:S.reader,es:S.es,en:S.en,audio:S.audio,min:S.min,prog:S.prog}))}
function U(id=S.unit){return C.u.find(x=>x.id===id)||C.u[0]}
function P(id=S.unit){return S.prog[id]}
function total(){return Object.values(S.prog).reduce((n,x)=>n+(x.s||0),0)}
function pickUnits(){return S.sel.map(id=>U(id)).filter(Boolean)}
function pool(){const out=[];pickUnits().forEach(u=>u.i.forEach(a=>out.push(it(a,u))));return out.length?out:U().i.map(a=>it(a,U()))}
function it(a,u){return{id:a[0],l:a[1],es:a[2],k:a[3],v:a[4],c:a[5],ut:u.t,uid:u.id,a:u.a}}
function render(){const u=U();document.documentElement.style.setProperty('--a',u.a);A.innerHTML=`<div class="shell">${top(u)}<div class="layout">${side(u)}<main class="main">${screen(u)}</main></div>${bot()}</div><div class="toast ${S.toast?'show':''}">${S.toast?`<strong>${S.toast[0]}</strong><span>${S.toast[1]}</span>`:''}</div>`;bind();save()}
function top(u){return`<div class="top"><div class="dots"><span class="d r"></span><span class="d y"></span><span class="d g"></span></div><div class="rb">🤖</div><div class="tt"><h1>${C.t}</h1><p>${u.t} · ${S.sel.length} study ${S.sel.length===1?'unit':'units'} selected</p></div><div class="pill">⭐ ${total()}</div></div>`}
function side(u){return`<aside class="side"><section class="box"><h2 style="margin:0">Home Studio</h2><p>Audio-first English practice for a 5-year-old child.</p></section><section style="display:grid;gap:10px">${C.u.map((x,i)=>`<button class="u ${x.id===u.id?'on':''}" data-focus="${x.id}"><strong>Unit ${i+1} · ${x.t}</strong><small>${x.th}</small><small>${S.sel.includes(x.id)?'✓ In study plan':'○ Not selected'} · ⭐ ${P(x.id).s}</small></button>`).join('')}</section><section class="box"><h3 style="margin:0">Parent tips</h3><ul>${C.tips.map(t=>`<li>${t}</li>`).join('')}</ul></section></aside>`}
function bot(){const a=[['home','🏠','Home'],['learn','🧭','Explore'],['listen','🎧','Listen'],['settings','🛠️','Parent']];return`<nav class="bot">${a.map(x=>`<button class="nav ${on(x[0])?'on':''}" data-nav="${x[0]}"><span>${x[1]}</span><span>${x[2]}</span></button>`).join('')}</nav>`}
function on(id){return(S.screen==='home'&&id==='home')||(S.screen==='settings'&&id==='settings')||(S.screen==='activity'&&S.mode===id)}
function screen(u){if(S.screen==='settings')return sets();if(S.screen==='activity')return actv();return home(u)}
function home(u){return`<section class="hero"><div class="bg" style="background:${u.g}"></div><div class="heroin"><div><div class="ey">Calibots 2 · Responsive study app</div><h2>${u.t}</h2><p>${u.d} The study modes below now force listening instead of showing the answer first.</p><div class="chips" style="margin-top:14px">${u.p.map(x=>`<span class="chip">${x}</span>`).join('')}</div><div class="acts" style="margin-top:16px"><button class="btn pri" data-mode="learn">🧭 Start explorer</button><button class="btn sec" data-mode="listen">🎧 Listen & tap</button><button class="btn sec" data-mode="match">🧩 Sound match</button><button class="btn sec" data-mode="quiz">🚀 Mission quiz</button></div></div><div class="mas"><div><div class="bubble">🤖</div><h3>Hello, ${esc(S.name)}!</h3><p>${S.reader==='pre'?'Pre-reader mode is active.':'Reader support is active.'}</p><div class="acts" style="justify-content:center;margin-top:12px"><button class="btn soft" data-act="intro">🔊 Hear intro</button></div></div></div></div></section><section class="grid4">${[['⭐',P().s,'Stars in the focused unit'],['📚',S.sel.length,'Units selected for practice'],['🧠',pool().length,'Vocabulary cards in the study pool'],['⏱️',S.min+' min','Target session length']].map(x=>`<article class="stat"><div class="ic">${x[0]}</div><h3 style="margin:10px 0 4px">${x[1]}</h3><p class="p" style="margin:0">${x[2]}</p></article>`).join('')}</section><section class="card"><div class="head"><div><div class="ey">Study plan</div><h2 style="margin:6px 0 0">Select one or many units</h2><p class="p" style="margin:6px 0 0">The practice modes use only the units you activate here.</p></div><div class="acts"><button class="btn sec" data-act="all">Select all</button><button class="btn sec" data-act="only">Only focused</button></div></div><div class="studygrid" style="margin-top:14px">${C.u.map((x,i)=>`<article class="study"><div class="row"><strong>Unit ${i+1}</strong><button class="tog ${S.sel.includes(x.id)?'on':''}" data-toggle="${x.id}">${S.sel.includes(x.id)?'Selected':'Select'}</button></div><div><strong>${x.t}</strong><p class="p" style="margin:6px 0 0">${x.th}</p></div><div class="p">⭐ ${P(x.id).s} · ${x.i.length} cards</div></article>`).join('')}</div></section><section class="card"><div class="head"><div><div class="ey">Modes</div><h2 style="margin:6px 0 0">Choose how to practice</h2><p class="p" style="margin:6px 0 0">Each mode now has a clear teaching purpose.</p></div><button class="btn sec" data-nav="settings">🛠️ Parent settings</button></div><div class="modes" style="margin-top:14px">${C.m.map(x=>`<button class="mode" data-mode="${x[0]}"><div class="ic">${x[1]}</div><h3 style="margin:10px 0 4px">${x[2]}</h3><p class="p" style="margin:0">${x[3]}</p></button>`).join('')}</div></section>`}
function actv(){if(S.mode==='learn')return learn();if(S.mode==='listen')return listen();if(S.mode==='match')return match();return quiz()}
function learn(){const d=S.ld.length?S.ld:pool(),x=d[S.li]||d[0],pc=((S.li+1)/d.length)*100;return`<section class="card"><div class="head"><div><div class="ey">Explorer mode</div><h2 style="margin:6px 0 0">Explore the selected units</h2><p class="p" style="margin:6px 0 0">Big cards and calmer audio. Best for first contact.</p></div><button class="btn sec" data-act="home">🏠 Home</button></div><div class="stage"><div class="panel">${vis(x)}</div><div class="copy"><h3>${disp(x)}</h3><p>${x.ut} · ${x.c}. Tap the speaker, listen and say it together.</p><div class="labels"><span class="lab">${x.c}</span><span class="lab">${x.ut}</span></div><div class="acts" style="margin-top:14px"><button class="btn pri" data-act="speak">🔊 Listen</button><button class="btn sec" data-act="prev">⬅️ Previous</button><button class="btn sec" data-act="next">Next ➡️</button></div><div class="barbg"><div class="bar" style="width:${pc}%"></div></div></div></div></section>`}
function listen(){const pc=(S.r/(S.d.length||1))*100;return`<section class="card"><div class="head"><div><div class="ey">Listen & Tap</div><h2 style="margin:6px 0 0">Use your ears first</h2><p class="p" style="margin:6px 0 0">The target picture is hidden on purpose. The child must listen and choose among the four options.</p></div><button class="btn sec" data-act="home">🏠 Home</button></div><div class="panel listen"><div class="big">🎧</div><h3 style="margin:0 0 6px">Listen</h3><p class="p" style="margin:0">Tap the speaker and choose the correct picture.</p><div class="acts" style="justify-content:center;margin-top:14px"><button class="btn pri" data-act="replay">🔊 Hear again</button></div></div><div class="choices">${S.ch.map(x=>`<button class="choice" data-choice="${x.id}">${vis(x,'sm')}<div class="name">${cap(x)}</div></button>`).join('')}</div><div class="fb ${S.fb[0]}">${S.fb[1]||''}</div><div class="barbg"><div class="bar" style="width:${pc}%"></div></div></section>`}
function quiz(){const pc=(S.r/(S.d.length||1))*100;return`<section class="card"><div class="head"><div><div class="ey">Mission Quiz</div><h2 style="margin:6px 0 0">Mixed review</h2><p class="p" style="margin:6px 0 0">Fast mixed practice using the selected units.</p></div><button class="btn sec" data-act="home">🏠 Home</button></div><div class="panel listen"><div class="big">🚀</div><h3 style="margin:0 0 6px">Mission ${S.r+1}/${S.d.length}</h3><p class="p" style="margin:0">Score: ${S.score}</p><div class="acts" style="justify-content:center;margin-top:14px"><button class="btn pri" data-act="replay">🔊 Hear again</button></div></div><div class="choices">${S.ch.map(x=>`<button class="choice" data-choice="${x.id}">${vis(x,'sm')}<div class="name">${cap(x)}</div></button>`).join('')}</div><div class="fb ${S.fb[0]}">${S.fb[1]||''}</div><div class="barbg"><div class="bar" style="width:${pc}%"></div></div></section>`}
function match(){return`<section class="card"><div class="head"><div><div class="ey">Sound Match</div><h2 style="margin:6px 0 0">Hear a word, then match it</h2><p class="p" style="margin:6px 0 0">First tap a sound card on the left. Then choose the correct picture on the right.</p></div><button class="btn sec" data-act="home">🏠 Home</button></div><div class="pair"><div class="audios">${S.ml.map((x,i)=>`<button class="audio ${S.sa===x.id?'sel':''}" data-ma="${x.id}" ${S.ms.includes(x.id)?'disabled':''}><span class="snd">🔊 ${text()?x.l:`Sound ${i+1}`}</span><span>${S.ms.includes(x.id)?'✓':''}</span></button>`).join('')}</div><div class="choices">${S.mr.map(x=>`<button class="match" data-mv="${x.id}" ${S.ms.includes(x.id)?'disabled':''}>${vis(x,'sm')}<div class="name">${cap(x)}</div></button>`).join('')}</div></div><div class="fb ${S.fb[0]}">${S.fb[1]||''}</div></section>`}
function sets(){return`<section class="card"><div class="head"><div><div class="ey">Parent controls</div><h2 style="margin:6px 0 0">Settings</h2><p class="p" style="margin:6px 0 0">Adapt the experience for pre-readers and emergent readers.</p></div><button class="btn sec" data-act="home">🏠 Home</button></div><div class="set"><article class="it"><h3 style="margin:0 0 8px">Child name</h3><p class="p" style="margin:0 0 12px">Used in greetings and feedback.</p><input class="inp" id="name" maxlength="18" value="${esca(S.name)}" placeholder="Explorer"></article><article class="it"><h3 style="margin:0 0 8px">Session length</h3><p class="p" style="margin:0 0 12px">Choose the target duration for each practice block.</p><select class="sel" id="mins"><option ${S.min===8?'selected':''}>8</option><option ${S.min===10?'selected':''}>10</option><option ${S.min===12?'selected':''}>12</option><option ${S.min===15?'selected':''}>15</option></select></article><article class="it"><h3 style="margin:0 0 8px">Reading support</h3><div class="tog2"><span>Pre-reader mode</span><button class="btn ${S.reader==='pre'?'pri':'sec'}" data-act="reader">${S.reader==='pre'?'Active':'Activate'}</button></div><div class="tog2"><span>Show Spanish hints</span><button class="btn ${S.es?'pri':'sec'}" data-act="spanish">${S.es?'On':'Off'}</button></div><div class="tog2"><span>Show English text</span><button class="btn ${S.en?'pri':'sec'}" data-act="english">${S.en?'On':'Off'}</button></div></article><article class="it"><h3 style="margin:0 0 8px">Audio and progress</h3><div class="tog2"><span>Auto-speak prompts</span><button class="btn ${S.audio?'pri':'sec'}" data-act="audio">${S.audio?'On':'Off'}</button></div><div class="tog2"><span>Reset saved progress</span><button class="btn sec" data-act="reset">Reset</button></div></article></div></section>`}
function bind(){A.querySelectorAll('[data-focus]').forEach(b=>b.onclick=()=>{S.unit=b.dataset.focus;S.screen='home';render()});A.querySelectorAll('[data-toggle]').forEach(b=>b.onclick=()=>tog(b.dataset.toggle));A.querySelectorAll('[data-mode]').forEach(b=>b.onclick=()=>start(b.dataset.mode));A.querySelectorAll('[data-nav]').forEach(b=>b.onclick=()=>nav(b.dataset.nav));A.querySelectorAll('[data-act]').forEach(b=>b.onclick=()=>act(b.dataset.act));A.querySelectorAll('[data-choice]').forEach(b=>b.onclick=()=>choose(b.dataset.choice));A.querySelectorAll('[data-ma]').forEach(b=>b.onclick=()=>ma(b.dataset.ma));A.querySelectorAll('[data-mv]').forEach(b=>b.onclick=()=>mv(b.dataset.mv));const n=document.getElementById('name');if(n)n.oninput=e=>{S.name=san(e.target.value)||'Explorer';save()};const m=document.getElementById('mins');if(m)m.onchange=e=>{S.min=Number(e.target.value);toast('Session updated',`${S.min} minute sessions selected.`);render()}}
function nav(id){if(id==='home'){S.screen='home';render();return}if(id==='settings'){S.screen='settings';render();return}start(id)}
function act(id){if(id==='home'){S.screen='home';clr();render();return}if(id==='intro'){say(`Hello ${S.name}. Today we study ${pickUnits().map(x=>x.t).join(', ')}.`,.72);return}if(id==='speak'){const d=S.ld.length?S.ld:pool(),x=d[S.li];if(x)say(x.l);return}if(id==='prev'){const d=S.ld.length?S.ld:pool();S.li=(S.li-1+d.length)%d.length;render();if(S.audio)say(d[S.li].l);return}if(id==='next'){const d=S.ld.length?S.ld:pool();S.li=(S.li+1)%d.length;P(d[S.li].uid).s+=1;render();if(S.audio)say(d[S.li].l);return}if(id==='replay'){const x=S.d[S.r];if(x)say(x.l);return}if(id==='reader'){S.reader=S.reader==='pre'?'reader':'pre';if(S.reader==='pre')S.en=false;render();return}if(id==='spanish'){S.es=!S.es;render();return}if(id==='english'){S.en=!S.en;if(S.en)S.reader='reader';render();return}if(id==='audio'){S.audio=!S.audio;render();return}if(id==='reset'){if(confirm('Reset all stars, badges and best scores?')){S.prog=defp();toast('Progress reset','All saved progress was cleared.');render()}return}if(id==='all'){S.sel=C.u.map(x=>x.id);toast('Study plan updated','All units are selected.');render();return}if(id==='only'){S.sel=[S.unit];toast('Study plan reset','Only the focused unit is selected.');render();return}}
function tog(id){if(S.sel.includes(id)){if(S.sel.length===1){toast('At least one unit','You need one active study unit.');return}S.sel=S.sel.filter(x=>x!==id)}else S.sel=[...S.sel,id];toast('Study plan updated',`${S.sel.length} units selected.`);render()}
function start(mode){S.screen='activity';S.mode=mode;S.score=0;S.r=0;clr();const p=sh(pool());if(mode==='learn'){S.ld=p;S.li=0;render();if(S.audio&&p[0])setTimeout(()=>say(p[0].l),220);return}if(mode==='match'){S.ml=p.slice(0,Math.min(4,p.length));S.mr=sh([...S.ml]);S.ms=[];S.sa=null;render();return}S.d=p.slice(0,Math.min(8,p.length));S.ch=opts(S.d[0],p);render();if(S.audio&&S.d[0])setTimeout(()=>say(S.d[0].l),220)}
function opts(cur,p){const w=sh(p.filter(x=>x.id!==cur.id)).slice(0,3);return sh([cur,...w])}
function choose(id){const cur=S.d[S.r];if(!cur)return;if(id===cur.id){S.fb=['ok',S.es?'¡Muy bien!':'Great job!'];P(cur.uid).s+=1;S.score+=1;say(`Great job. ${cur.l}.`,.82);setTimeout(next,760);render()}else{S.fb=['bad',S.es?'Intenta de nuevo':'Try again'];render();say(`Try again. ${cur.l}.`,.82)}}
function next(){S.r+=1;clr();const cur=S.d[S.r];if(!cur){finish();return}S.ch=opts(cur,pool());render();if(S.audio)say(cur.l)}
function finish(){const n=S.d.length||1;if(S.score>=Math.max(4,Math.ceil(n*.7))){const b=C.bad[(S.score+n)%C.bad.length];S.sel.forEach(id=>S.prog[id].b=b)}toast('Mode finished',`Score ${S.score} / ${n}`);S.screen='home';render()}
function ma(id){if(S.ms.includes(id))return;S.sa=id;render();const x=S.ml.find(y=>y.id===id);if(x)say(x.l)}
function mv(id){if(S.ms.includes(id)||!S.sa)return;if(id===S.sa){S.ms.push(id);const x=S.mr.find(y=>y.id===id);if(x)P(x.uid).s+=1;S.fb=['ok',S.es?'¡Pareja correcta!':'Perfect match!'];S.sa=null;render();say('Perfect match.',.82);if(S.ms.length>=S.ml.length){toast('Match complete','All sound matches solved.');S.screen='home';render()}}else{S.fb=['bad',S.es?'No coincide':'Not a match'];render();say('Not a match. Try again.',.82)}}
function vis(x,size){if(!x)return'';const s=size==='sm'?' sm':'';if(x.k==='c')return`<div class="visual${s}"><div class="sw" style="background:${x.v}"></div></div>`;if(x.k==='n')return`<div class="visual${s}"><div class="num">${x.v}</div></div>`;if(x.k==='s'){const sh=x.v==='triangle'?'<div class="tri"></div>':x.v==='square'?'<div class="sq"></div>':'<div class="cir"></div>';return`<div class="visual${s}"><div class="shape">${sh}</div></div>`}if(x.k==='z'){const px=x.v==='big'?(size==='sm'?92:150):(size==='sm'?52:84);return`<div class="visual${s}"><div class="dot" style="width:${px}px;height:${px}px"></div></div>`}return`<div class="visual${s}"><div class="emo">${x.v}</div></div>`}
function disp(x){return text()?(S.es?`${x.l} · ${x.es}`:x.l):x.es}
function cap(x){return text()?(S.es?`${x.l} · ${x.es}`:x.l):''}
function text(){return S.en||S.reader==='reader'}
function say(t,r=.78){if(!('speechSynthesis'in window)||!t)return;window.speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(t);u.lang='en-US';u.rate=r;u.pitch=1.04;const v=window.speechSynthesis.getVoices().find(x=>/^en(-|_)/i.test(x.lang));if(v)u.voice=v;window.speechSynthesis.speak(u)}
function sh(a){return[...a].sort(()=>Math.random()-.5)}function clr(){S.fb=['','']}function toast(a,b){S.toast=[a,b];render();clearTimeout(T);T=setTimeout(()=>{S.toast=null;render()},1800)}function san(v){return String(v||'').replace(/[<>]/g,'').trim().slice(0,18)}function esc(v){return String(v).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;')}function esca(v){return esc(v)}
</script></body></html>
